<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Escape</title>

  <!-- Sosyal Medya Önizlemesi (Metinsiz) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Arrow Escape" />
  <meta property="og:url" content="https://vedatakcan.github.io/arroescape/" />

  <!-- Görsel -->
  <meta property="og:image" content="https://vedatakcan.github.io/arroescape/arro.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="300" />
  <meta property="og:image:height" content="300" />

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Arrow Escape">
  <meta name="twitter:image" content="https://vedatakcan.github.io/arroescape/arro.png">

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #08131F;
    }

    .progress-container {
      width: 200px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 3px;
    }

    .progress-bar {
      width: 0%;
      height: 6px;
      border-radius: 10px;
      background: linear-gradient(90deg,#35D0FF,#2A7BFF);
      animation: loadBar 1.2s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes loadBar {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

<div class="progress-container">
  <div class="progress-bar"></div>
</div>

<script>
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);

  // Linkler
  const iosStore = "https://apps.apple.com/app/arro-arrow-escape-puzzle/id6782473364";
  const androidStore = "https://play.google.com/store/apps/details?id=com.vedatakcan.arroescape"; // Paket adını düzelt

  let targetUrl = iosStore; 

  if (isIOS) {
    targetUrl = iosStore;
  } else if (isAndroid) {
    targetUrl = androidStore;
  }

  // Hemen yönlendir
  setTimeout(() => {
    window.location.replace(targetUrl);
  }, 500);
</script>

</body>
</html>
