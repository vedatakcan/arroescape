<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arro Escape</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Arka plan okları -->
    <div class="maze-background" id="mazeBg"></div>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">ARRO</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul id="nav-links">
            <li><a href="#">Ana Sayfa</a></li>
            <li><a href="#">Gizlilik</a></li>
            <li><a href="#">Kullanıcı Sözleşmesi</a></li>
        </ul>
    </nav>

    <!-- ANA İÇERİK (Sadece başlık ve açıklama) -->
    <main>
        <h1>Arro Escape</h1>
        <p class="subtitle">Zihnini zorlayan minimalist labirent bulmacaları.</p>
        <!-- Buton kaldırıldı -->
    </main>

    <script>
        // ---------- MOBİL MENÜ ----------
        function toggleMenu() {
            document.getElementById("nav-links").classList.toggle("active");
        }

        // ---------- ARKA PLAN OKLARI (Yavaş, az, renkli) ----------
        (function createArrows() {
            const container = document.getElementById("mazeBg");
            const arrowSymbols = ["↑", "→", "↓", "←"];
            const count = 12; // Az sayıda ok

            // Renk paleti (neon tonları)
            const colors = [
                "#00ff88", // yeşil
                "#ff6b6b", // kırmızı
                "#ffd93d", // sarı
                "#6bcbff", // mavi
                "#b47aea", // mor
                "#ff8a5c", // turuncu
                "#00d2d3", // camgöbeği
                "#f368e0", // pembe
            ];

            for (let i = 0; i < count; i++) {
                const span = document.createElement("span");
                span.className = "arrow";
                span.textContent = arrowSymbols[Math.floor(Math.random() * arrowSymbols.length)];

                // Boyut (20px – 50px)
                const size = Math.random() * 30 + 20;
                span.style.fontSize = size + "px";

                // Rastgele konum
                span.style.left = Math.random() * 100 + "%";
                span.style.top = Math.random() * 100 + "%";

                // Rastgele renk
                const color = colors[Math.floor(Math.random() * colors.length)];
                span.style.color = color;
                span.style.textShadow = `0 0 15px ${color}66`; // hafif parlaklık

                // Yön (data attribute)
                const dir = span.textContent;
                span.dataset.dir = dir;

                // YAVAŞ hız (10-25 px/s) - çok yavaş
                const speed = Math.random() * 15 + 8;
                span.dataset.speed = speed;

                // Opaklık (0.15 – 0.35) - daha görünür
                span.style.opacity = Math.random() * 0.2 + 0.15;

                container.appendChild(span);
            }

            // Animasyon döngüsü (yavaş)
            function animateArrows() {
                const arrows = document.querySelectorAll(".arrow");
                arrows.forEach(arrow => {
                    const dir = arrow.dataset.dir;
                    const speed = parseFloat(arrow.dataset.speed);
                    let left = parseFloat(arrow.style.left) || 0;
                    let top = parseFloat(arrow.style.top) || 0;
                    const step = speed / 60; // 60 FPS

                    // Yöne göre hareket (yüzdelik)
                    if (dir === "→") {
                        left += step / 100 * 100;
                        if (left > 105) left = -5;
                    } else if (dir === "←") {
                        left -= step / 100 * 100;
                        if (left < -5) left = 105;
                    } else if (dir === "↓") {
                        top += step / 100 * 100;
                        if (top > 105) top = -5;
                    } else if (dir === "↑") {
                        top -= step / 100 * 100;
                        if (top < -5) top = 105;
                    }

                    arrow.style.left = left + "%";
                    arrow.style.top = top + "%";
                });

                requestAnimationFrame(animateArrows);
            }

            animateArrows();
        })();
    </script>
</body>
</html>
