<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arro Escape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Arka plan okları -->
    <div class="maze-background" id="mazeBg"></div>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">ARRO</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul id="nav-links">
            <li><a href="#">Ana Sayfa</a></li>
            <li><a href="#">Gizlilik</a></li>
            <li><a href="#">Kullanıcı Sözleşmesi</a></li>
        </ul>
    </nav>

    <!-- ANA İÇERİK (sade) -->
    <main>
        <h1>Arro Escape</h1>
        <p class="subtitle">Zihnini zorlayan minimalist labirent bulmacaları.</p>
        <button class="cta-button">Hemen İndir</button>
    </main>

    <script>
        // Mobil menü
        function toggleMenu() {
            document.getElementById("nav-links").classList.toggle("active");
        }

        // Arka plan okları (az, yavaş, renkli)
        (function createArrows() {
            const container = document.getElementById("mazeBg");
            const arrowSymbols = ["↑", "→", "↓", "←"];
            const count = 10; // az sayıda
            const colors = [
                "#00ff88", "#00ccff", "#aa66ff", "#ff66aa", "#ffaa44",
                "#ff4466", "#66ffcc", "#ff9966", "#aaff66", "#66aaff"
            ];

            for (let i = 0; i < count; i++) {
                const span = document.createElement("span");
                span.className = "arrow";
                const sym = arrowSymbols[Math.floor(Math.random() * arrowSymbols.length)];
                span.textContent = sym;

                // Boyut (20px – 50px)
                const size = Math.random() * 30 + 20;
                span.style.fontSize = size + "px";

                // Rastgele renk
                const color = colors[Math.floor(Math.random() * colors.length)];
                span.style.color = color;
                span.style.textShadow = `0 0 15px ${color}66`;

                // Başlangıç konumu
                span.style.left = Math.random() * 100 + "%";
                span.style.top = Math.random() * 100 + "%";

                // Yön
                span.dataset.dir = sym;

                // Yavaş hız (10-30 px/s)
                const speed = Math.random() * 20 + 10;
                span.dataset.speed = speed;

                // Opaklık (biraz daha belirgin olsun)
                span.style.opacity = Math.random() * 0.3 + 0.15;

                container.appendChild(span);
            }

            // Animasyon döngüsü
            function animateArrows() {
                const arrows = document.querySelectorAll(".arrow");
                arrows.forEach(arrow => {
                    const dir = arrow.dataset.dir;
                    const speed = parseFloat(arrow.dataset.speed);
                    let left = parseFloat(arrow.style.left) || 0;
                    let top = parseFloat(arrow.style.top) || 0;
                    const step = speed / 60; // 60 FPS

                    if (dir === "→") {
                        left += step / 100 * 100;
                        if (left > 100) left = -5;
                    } else if (dir === "←") {
                        left -= step / 100 * 100;
                        if (left < -5) left = 100;
                    } else if (dir === "↓") {
                        top += step / 100 * 100;
                        if (top > 100) top = -5;
                    } else if (dir === "↑") {
                        top -= step / 100 * 100;
                        if (top < -5) top = 100;
                    }
                    arrow.style.left = left + "%";
                    arrow.style.top = top + "%";
                });
                requestAnimationFrame(animateArrows);
            }
            animateArrows();
        })();
    </script>
</body>
</html>
