<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arro Escape</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="maze-background" id="mazeBg"></div>

    <nav>
        <div class="logo">ARRO</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="privacy.html">Privacy</a></li>
            <li><a href="terms.html">Terms</a></li>
        </ul>
    </nav>

    <main>
        <h1>Arro Escape</h1>
        <p class="subtitle">Minimalist maze puzzles that challenge your mind.</p>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById("nav-links").classList.toggle("active");
        }

        // Arka plan animasyonu aynı kalacak
        (function createArrows() {
            const container = document.getElementById("mazeBg");
            const arrowSymbols = ["↑", "→", "↓", "←"];
            const count = 12;
            const colors = ["#00ff88", "#ff6b6b", "#ffd93d", "#6bcbff", "#b47aea", "#ff8a5c", "#00d2d3", "#f368e0"];

            for (let i = 0; i < count; i++) {
                const span = document.createElement("span");
                span.className = "arrow";
                span.textContent = arrowSymbols[Math.floor(Math.random() * arrowSymbols.length)];
                span.style.fontSize = (Math.random() * 30 + 20) + "px";
                span.style.left = Math.random() * 100 + "%";
                span.style.top = Math.random() * 100 + "%";
                const color = colors[Math.floor(Math.random() * colors.length)];
                span.style.color = color;
                span.style.textShadow = `0 0 15px ${color}66`;
                span.dataset.dir = span.textContent;
                span.dataset.speed = Math.random() * 15 + 8;
                span.style.opacity = Math.random() * 0.2 + 0.15;
                container.appendChild(span);
            }

            function animateArrows() {
                const arrows = document.querySelectorAll(".arrow");
                arrows.forEach(arrow => {
                    const dir = arrow.dataset.dir;
                    const speed = parseFloat(arrow.dataset.speed);
                    let left = parseFloat(arrow.style.left) || 0;
                    let top = parseFloat(arrow.style.top) || 0;
                    const step = speed / 60;
                    if (dir === "→") { left += step; if (left > 105) left = -5; }
                    else if (dir === "←") { left -= step; if (left < -5) left = 105; }
                    else if (dir === "↓") { top += step; if (top > 105) top = -5; }
                    else if (dir === "↑") { top -= step; if (top < -5) top = 105; }
                    arrow.style.left = left + "%";
                    arrow.style.top = top + "%";
                });
                requestAnimationFrame(animateArrows);
            }
            animateArrows();
        })();
    </script>
</body>
</html>
